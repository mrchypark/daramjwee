apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcsemulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcsemulator
  template:
    metadata:
      labels:
        app: gcsemulator
    spec:
      containers:
        - name: gcsemulator
          image: fullstorydev/gcsemulator@sha256:739edad40c5b977c7d9b41573eb6dfa8c376a5351bb197a52a5c24a9f517a70b
          args:
            - -host
            - 0.0.0.0
            - -port
            - "9000"
          ports:
            - name: http
              containerPort: 9000
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 1
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: gcsemulator
spec:
  selector:
    app: gcsemulator
  ports:
    - name: http
      port: 9000
      targetPort: 9000
